<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AKSAKA V30.0 - OMNIPOTENCE ELITE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Share+Tech+Mono&display=swap');
        :root { --g: #d4af37; --b: #000; }
        body { background: var(--b); color: var(--g); font-family: 'Share Tech Mono', monospace; overflow: hidden; height: 100vh; touch-action: manipulation; }
        
        /* BACKGROUND PARTICLE GACOR */
        #canvas { position: fixed; top: 0; left: 0; z-index: -1; width: 100%; height: 100%; opacity: 0.3; }

        .omnipotence-card {
            background: rgba(5, 5, 5, 0.95);
            border: 1px solid var(--g);
            box-shadow: 0 0 80px rgba(212, 175, 55, 0.15);
            backdrop-filter: blur(25px);
            border-radius: 10px;
            position: relative;
            z-index: 10;
        }

        .layer-content { display: none; opacity: 0; transform: translateY(10px); transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
        .layer-active { display: flex; flex-direction: column; opacity: 1; transform: translateY(0); }

        .nav-btn { border-bottom: 2px solid transparent; transition: 0.3s; font-size: 10px; letter-spacing: 2px; }
        .nav-btn.active { border-color: var(--g); color: white; text-shadow: 0 0 10px var(--g); }

        /* FEATURE 100JT: BYPASS OVERLAY */
        #bypass-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: black; z-index: 9999; display: none;
            flex-direction: column; justify-content: center; align-items: center;
            font-family: 'Share Tech Mono';
        }

        .glow-bar { width: 0%; height: 2px; background: var(--g); box-shadow: 0 0 20px var(--g); transition: 0.1s; }
    </style>
</head>
<body class="flex items-center justify-center p-4">

    <canvas id="canvas"></canvas>

    <div id="bypass-screen">
        <p class="mb-4 text-xs animate-pulse">> INITIALIZING NEURAL BYPASS...</p>
        <div class="w-64 border border-zinc-800 h-2 mb-4">
            <div id="load-bar" class="glow-bar"></div>
        </div>
        <div id="log-out" class="text-[8px] opacity-50 h-32 overflow-hidden w-64"></div>
    </div>

    <audio id="bgMusic" loop src="https://files.catbox.moe/v3m7w0.mp3"></audio>

    <div class="w-full max-w-lg">
        <header class="text-center mb-8">
            <h1 class="text-5xl font-black italic font-['Orbitron'] tracking-tighter" style="text-shadow: 0 0 15px var(--g);">AKSAKA V30</h1>
            <p class="text-[8px] tracking-[1.5em] opacity-40 uppercase">Omnipotence Lurax Prime</p>
        </header>

        <main class="omnipotence-card p-6 min-h-[500px]">
            <div class="flex justify-between mb-10 border-b border-white/5">
                <button onclick="st('l1', this)" class="nav-btn active px-2 py-4">PRICELIST</button>
                <button onclick="st('l2', this)" class="nav-btn px-2 py-4">ENGINE</button>
                <button onclick="st('l3', this)" class="nav-btn px-2 py-4">TEAM</button>
                <button onclick="st('l4', this)" class="nav-btn px-2 py-4">UPLINK</button>
            </div>

            <div id="l1" class="layer-content layer-active">
                <div class="space-y-4">
                    <div class="p-4 bg-zinc-900/50 border-l-4 border-gold flex justify-between items-center">
                        <span class="text-sm font-bold">BRONZE - SILVER</span>
                        <span class="text-white">10K</span>
                    </div>
                    <div class="p-4 bg-zinc-900/50 border-l-4 border-gold flex justify-between items-center">
                        <span class="text-sm font-bold">LEGEND - MYTHIC</span>
                        <span class="text-white font-['Orbitron']">100K</span>
                    </div>
                    <div class="mt-8">
                        <p class="text-[10px] opacity-40 mb-4 uppercase">Portofolio VIP</p>
                        <div class="grid grid-cols-2 gap-2">
                            <div class="h-24 bg-zinc-800 border border-gold/10 rounded flex items-center justify-center text-[8px]">PREMIUM_SS_1</div>
                            <div class="h-24 bg-zinc-800 border border-gold/10 rounded flex items-center justify-center text-[8px]">PREMIUM_SS_2</div>
                        </div>
                    </div>
                </div>
            </div>

            <div id="l2" class="layer-content">
                <div class="space-y-6">
                    <select id="sR" class="w-full p-4 bg-black border border-gold/20 rounded text-xs outline-none">
                        <option value="0">BRONZE</option><option value="15">LEGEND</option>
                    </select>
                    <div class="text-center opacity-20">▼</div>
                    <select id="eR" class="w-full p-4 bg-black border border-gold/20 rounded text-xs outline-none">
                        <option value="1">SILVER</option><option value="20">MYTHIC</option>
                    </select>
                    <button onclick="startBypass()" class="w-full bg-gold text-black font-black py-5 uppercase text-xs tracking-widest hover:invert transition">EXECUTE SYSTEM BYPASS</button>
                    <h3 id="res" class="text-5xl text-center font-['Orbitron'] font-black mt-6 tracking-tighter">Rp 0</h3>
                </div>
            </div>

            <div id="l3" class="layer-content">
                <div class="space-y-3">
                    <div class="p-4 border border-gold/10 rounded flex justify-between text-xs">
                        <span class="opacity-50">PRIME EXECUTIONER</span> <span class="font-bold uppercase">AKSAKA PEPEK</span>
                    </div>
                    <div class="p-4 border border-gold/10 rounded flex justify-between text-xs">
                        <span class="opacity-50">CORE ARCHITECT</span> <span class="font-bold">STOKY VOLT</span>
                    </div>
                </div>
            </div>

            <div id="l4" class="layer-content items-center py-10">
                <a href="https://wa.me/628891262208" class="flex items-center gap-6 p-6 border border-gold/20 w-full hover:bg-gold hover:text-black transition group">
                    <i class="fab fa-whatsapp text-4xl"></i>
                    <div><p class="font-black text-xs uppercase tracking-widest">Connect to Admin</p><p class="text-[8px] opacity-50">Direct Uplink Established</p></div>
                </a>
            </div>
        </main>
    </div>

    <script>
        // BACKGROUND 
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        let particles = [];
        for(let i=0; i<100; i++) particles.push({x: Math.random()*canvas.width, y: Math.random()*canvas.height, s: Math.random()*2});
        function draw() {
            ctx.clearRect(0,0,canvas.width,canvas.height);
            ctx.fillStyle = "#d4af37";
            particles.forEach(p => {
                ctx.beginPath(); ctx.arc(p.x, p.y, p.s, 0, Math.PI*2); ctx.fill();
                p.y -= 0.5; if(p.y < 0) p.y = canvas.height;
            });
            requestAnimationFrame(draw);
        }
        draw();

        // CORE LOGIC
        function st(id, btn) {
            document.getElementById('bgMusic').play().catch(()=>{});
            document.querySelectorAll('.layer-content').forEach(l => l.classList.remove('layer-active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('layer-active');
            btn.classList.add('active');
            
            const talk = new SpeechSynthesisUtterance("Lurax Omnipotence Engaged.");
            talk.rate = 1; talk.pitch = 0.1; window.speechSynthesis.speak(talk);
        }

        function startBypass() {
            const scr = document.getElementById('bypass-screen');
            const bar = document.getElementById('load-bar');
            const log = document.getElementById('log-out');
            const logs = ["> SCRACTHING KERNEL...", "> INJECTING PAYLOAD...", "> BYPASSING AUTH...", "> DONE."];
            
            scr.style.display = 'flex';
            let p = 0;
            const int = setInterval(() => {
                p += 2;
                bar.style.width = p + '%';
                if(p % 20 === 0) log.innerHTML += `<p>${logs[Math.floor(p/30)] || "> PROCESSING..."}</p>`;
                if(p >= 100) {
                    clearInterval(int);
                    setTimeout(() => {
                        scr.style.display = 'none';
                        log.innerHTML = ''; bar.style.width = '0%';
                        calculate();
                    }, 500);
                }
            }, 30);
        }

        function calculate() {
            let s = document.getElementById('sR').value;
            let e = document.getElementById('eR').value;
            let total = (e-s) * 9000;
            if(s=="15" && e=="20") total = 100000;
            if(total < 0) total = 0;
            document.getElementById('res').innerText = "Rp " + total.toLocaleString('id-ID');
            setTimeout(() => {
                window.open(`https://wa.me/628891262208?text=[OMNIPOTENCE_BYPASS] Order ID: Rp ${total.toLocaleString('id-ID')}`);
            }, 1000);
        }
    </script>
</body>
</html>
